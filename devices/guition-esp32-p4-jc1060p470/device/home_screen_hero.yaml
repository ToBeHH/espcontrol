# =============================================================================
# HOME SCREEN HERO - Banner image above the button grid
# =============================================================================
# Source is a photo of the panel; scaled to fit the content width without
# dominating the layout. Loaded before lvgl.yaml (see packages.yaml).
# =============================================================================

image:
  - file: home_screen_hero.jpg
    id: home_screen_hero_img
    type: RGB565
    # Photo is ~1024×902; this box preserves aspect ratio so width stays usable
    # (a short box would scale by height and shrink width). LVGL stretches to width.
    resize: 1014x360
    byte_order: little_endian
