# =============================================================================
# SCREEN: HOME ASSISTANT ACTIONS
# =============================================================================
# Shown after the API client connects. Reminds the user to allow the device
# to perform Home Assistant actions. Automatically advances to button setup
# or main page after a short delay.
# =============================================================================

lvgl:
  pages:
    - id: ha_actions_page
      bg_color: 0x000000
      scrollable: false
      pad_all: 0
      widgets:
        - obj:
            width: 1024
            height: 600
            bg_opa: 0%
            border_width: 0
            pad_all: 0
            scrollable: false
            clickable: true
            on_press:
              then:
                - script.stop: setup_screen_dim
                - light.turn_on:
                    id: display_backlight
                    brightness: 90%
                - script.execute: setup_screen_dim
            widgets:
              - obj:
                  align: center
                  width: 550
                  height: SIZE_CONTENT
                  bg_opa: 0%
                  border_width: 0
                  pad_all: 0
                  scrollable: false
                  clickable: false
                  layout:
                    type: flex
                    flex_flow: COLUMN
                    flex_align_main: center
                    flex_align_cross: center
                    pad_row: 20
                  widgets:
                    - label:
                        text_font: icon_font_setup
                        text: $icon_home_assistant
                        text_color: 0xFFFFFF
                        text_align: center
                    - label:
                        text: "Home Assistant"
                        text_font: setup_title_font
                        text_color: 0xFFFFFF
                        width: 550
                        text_align: center
                    - label:
                        text: "Allow this device to perform\nHome Assistant actions"
                        text_font: setup_body_font
                        text_color: 0x888888
                        width: 550
                        text_align: center
